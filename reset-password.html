<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Amazon T Levels Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#F2F4F7;color:#1E2B3C;min-height:100vh;display:flex;flex-direction:column;}
.navbar{background:#1E2B3C;padding:0 28px;height:64px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 20px rgba(0,0,0,0.25);}
.logo{color:white;font-size:20px;font-weight:700;}.logo span{color:#FF9900;}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.auth-box{background:white;width:100%;max-width:460px;border-radius:20px;box-shadow:0 8px 48px rgba(30,43,60,0.12);overflow:hidden;}
.auth-box-top{background:#E8ECF2;padding:36px 40px;position:relative;}
.auth-box-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#FF9900,#2E9E8E);}
.auth-box-top h2{color:#1E2B3C;font-size:24px;font-weight:800;margin-bottom:4px;}
.auth-box-top p{color:#4A5568;font-size:14px;}
.auth-body{padding:36px 40px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:#4A5568;margin-bottom:6px;letter-spacing:0.2px;}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid #D2D7DF;border-radius:10px;font-size:14px;background:white;color:#1E2B3C;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:#2E9E8E;}
.password-wrapper{position:relative;}
.password-wrapper input{padding-right:45px;}
.password-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#4A5568;padding:4px;display:flex;align-items:center;justify-content:center;}
.password-toggle:hover{color:#2E9E8E;}
.password-toggle svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.btn-submit{width:100%;padding:13px;background:#FF9900;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn-submit:hover{background:#e68a00;transform:translateY(-1px);}
.btn-submit:disabled{background:#ccc;cursor:not-allowed;transform:none;}
.msg{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:14px;font-weight:600;display:none;}
.msg.success{background:#d4edda;color:#155724;display:block;}
.msg.error{background:#f8d7da;color:#721c24;display:block;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.password-strength{height:4px;border-radius:2px;margin-top:6px;background:#e0e0e0;overflow:hidden;transition:all 0.3s;}
.password-strength-bar{height:100%;width:0%;border-radius:2px;transition:width 0.3s,background 0.3s;}
.password-strength-label{font-size:11px;margin-top:3px;display:block;text-align:right;}
footer{background:#1E2B3C;color:#D2D7DF;text-align:center;padding:20px;font-size:13px;}
footer strong{color:#FF9900;}
@media(max-width:500px){.auth-box-top,.auth-body{padding:28px 24px;}}

/* Dark mode */
.dark-mode,html.dark-mode body{background:#0F172A!important;color:#F8FAFC!important;}
.dark-mode .navbar{background:#162033!important;}
.dark-mode .auth-box{background:#1E293B!important;border-color:#334155!important;}
.dark-mode .auth-box-top{background:#162033!important;}
.dark-mode .auth-box-top h2{color:#F8FAFC!important;}
.dark-mode .auth-box-top p{color:#CBD5E1!important;}
.dark-mode .auth-body{background:#1E293B!important;}
.dark-mode .form-group label{color:#CBD5E1!important;}
.dark-mode .form-group input{background:#0F172A!important;color:#F8FAFC!important;border-color:#334155!important;}
.dark-mode .form-group input:focus{border-color:#2E9E8E!important;}
.dark-mode footer{background:#162033!important;color:#CBD5E1!important;}
</style>
</head>
<body>
<nav class="navbar"><div class="logo">Amazon <span>T Levels</span></div></nav>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-box-top">
      <h2>Set New Password</h2>
      <p>Enter your new password below</p>
    </div>
    <div class="auth-body">
      <div id="message" class="msg" role="alert" aria-live="polite"></div>
      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="Minimum 8 characters" required minlength="8" autocomplete="new-password">
            <button type="button" class="password-toggle" aria-label="Show password" data-target="newPassword">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
          <span class="password-strength-label" id="strengthLabel"></span>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Re-enter password" required autocomplete="new-password">
            <button type="button" class="password-toggle" aria-label="Show password" data-target="confirmPassword">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="resetBtn">Reset Password</button>
      </form>
    </div>
  </div>
</div>
<footer>&copy; 2026 <strong>Amazon T Levels Hub</strong></footer>

<script>
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000' : '';

// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
  document.getElementById('message').textContent = 'Invalid or missing reset token. Please request a new password reset.';
  document.getElementById('message').className = 'msg error';
  document.getElementById('resetBtn').disabled = true;
}

// Password strength
const pwInput = document.getElementById('newPassword');
const strengthBar = document.getElementById('strengthBar');
const strengthLabel = document.getElementById('strengthLabel');
if (pwInput && strengthBar) {
  pwInput.addEventListener('input', function() {
    const val = this.value;
    let strength = 0, label = '', color = '#e0e0e0';
    if (val.length >= 8) strength += 25;
    if (val.length >= 12) strength += 15;
    if (/[A-Z]/.test(val)) strength += 15;
    if (/[a-z]/.test(val)) strength += 15;
    if (/[0-9]/.test(val)) strength += 15;
    if (/[^A-Za-z0-9]/.test(val)) strength += 15;
    if (val.length === 0) { strength = 0; label = ''; color = '#e0e0e0'; }
    else if (strength < 30) { label = 'Weak'; color = '#ef4444'; }
    else if (strength < 50) { label = 'Fair'; color = '#f97316'; }
    else if (strength < 70) { label = 'Good'; color = '#eab308'; }
    else if (strength < 85) { label = 'Strong'; color = '#22c55e'; }
    else { label = 'Very Strong'; color = '#16a34a'; }
    strengthBar.style.width = Math.min(strength, 100) + '%';
    strengthBar.style.background = color;
    if (strengthLabel) strengthLabel.textContent = label;
  });
}

// Password toggle
document.querySelectorAll('.password-toggle').forEach(function(toggle){
  toggle.addEventListener('click',function(){
    const targetId = this.dataset.target;
    const input = document.getElementById(targetId);
    if (!input) return;
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    const eyeIcon = '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    const eyeOffIcon = '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    this.innerHTML = isPassword ? eyeOffIcon : eyeIcon;
    this.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });
});

// Submit
document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('resetBtn');
  const password = pwInput.value;
  const confirm = document.getElementById('confirmPassword').value;
  const msg = document.getElementById('message');

  if (password !== confirm) {
    msg.textContent = 'Passwords do not match';
    msg.className = 'msg error';
    return;
  }

  if (password.length < 8) {
    msg.textContent = 'Password must be at least 8 characters';
    msg.className = 'msg error';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Resetting...';

  try {
    const r = await fetch(API_BASE + '/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await r.json();
    if (r.ok) {
      msg.textContent = 'Password reset successfully! Redirecting to login...';
      msg.className = 'msg success';
      setTimeout(() => window.location.href = 'index.html', 2000);
    } else {
      msg.textContent = data.message || 'Reset failed';
      msg.className = 'msg error';
    }
  } catch(err) {
    msg.textContent = 'Error connecting to server';
    msg.className = 'msg error';
  }

  btn.disabled = false;
  btn.textContent = 'Reset Password';
});
</script>
</body>
</html>
